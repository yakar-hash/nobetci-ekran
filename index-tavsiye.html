<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<title>Şifa Eczanesi – Günün Tavsiyesi</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: #E8EDE8;
}

/* ── ARKA PLAN BLOB'LAR ── */
.bg-blobs {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.blob {
  position: absolute; border-radius: 50%;
  filter: blur(90px);
  animation: drift 20s ease-in-out infinite;
}
.b1 { width: 80vw; height: 50vh; background: radial-gradient(ellipse, rgba(100,180,130,0.50), transparent 70%); top: -10%; left: -15%; animation-duration: 22s; }
.b2 { width: 70vw; height: 60vh; background: radial-gradient(ellipse, rgba(80,140,210,0.30), transparent 70%); top: -5%; right: -15%; animation-duration: 26s; animation-delay: -8s; }
.b3 { width: 90vw; height: 45vh; background: radial-gradient(ellipse, rgba(210,150,80,0.25),  transparent 70%); bottom: -8%; left: 5%;  animation-duration: 30s; animation-delay: -15s; }
.b4 { width: 60vw; height: 50vh; background: radial-gradient(ellipse, rgba(170,90,160,0.18),  transparent 70%); bottom: 5%;  right: -10%; animation-duration: 24s; animation-delay: -5s; }
@keyframes drift {
  0%   { transform: translate(0,0)        scale(1);    }
  33%  { transform: translate(3vw,-3vh)   scale(1.07); }
  66%  { transform: translate(-2vw, 3vh)  scale(0.95); }
  100% { transform: translate(0,0)        scale(1);    }
}

/* ── ANA LAYOUT: dikey ekran için ── */
.screen {
  position: relative; z-index: 1;
  width: 100%; height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 6vh 8vw;
}

/* ── ÜST: marka ── */
.topbar {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2vh;
  padding-bottom: 3vh;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.havan-svg { opacity: 0.6; }

.marka-isim {
  font-family: 'Lora', serif;
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 600;
  color: #1A2E1E;
  text-align: center;
  letter-spacing: 0.5px;
}
.marka-slogan {
  font-size: clamp(13px, 2vw, 18px);
  font-weight: 400;
  letter-spacing: 3px;
  color: #5A8A6A;
  text-transform: uppercase;
  text-align: center;
}

/* ── ORTA: tavsiye kartı ── */
.kart-wrap {
  flex: 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3vh 0;
}

.ana-kart {
  width: 100%;
  background: rgba(255,255,255,0.52);
  backdrop-filter: blur(36px);
  -webkit-backdrop-filter: blur(36px);
  border: 1px solid rgba(255,255,255,0.80);
  border-radius: 36px;
  padding: 6vh 8vw;
  text-align: center;
  box-shadow:
    0 24px 64px rgba(0,0,0,0.09),
    inset 0 1px 0 rgba(255,255,255,0.95);
  position: relative; overflow: hidden;
  opacity: 0; transform: translateY(24px);
  animation: riseIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
}
.ana-kart::before {
  content: '';
  position: absolute; top: 0; right: 0;
  width: 50%; height: 40%;
  background: radial-gradient(circle at top right, rgba(100,180,130,0.15), transparent 65%);
  border-radius: 0 36px 0 0; pointer-events: none;
}
.ana-kart::after {
  content: '';
  position: absolute; bottom: 0; left: 0;
  width: 40%; height: 35%;
  background: radial-gradient(circle at bottom left, rgba(80,140,210,0.10), transparent 65%);
  border-radius: 0 0 0 36px; pointer-events: none;
}

@keyframes riseIn { to { opacity: 1; transform: translateY(0); } }

.etiket {
  font-size: clamp(11px, 1.8vw, 15px);
  font-weight: 600;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #5A8A6A;
  margin-bottom: 3vh;
}

.buyuk-ikon {
  font-size: clamp(72px, 14vw, 120px);
  line-height: 1;
  margin-bottom: 3vh;
  display: block;
  filter: drop-shadow(0 6px 16px rgba(0,0,0,0.12));
  animation: iconIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.4s both;
}
@keyframes iconIn {
  from { transform: scale(0.4) rotate(-12deg); opacity: 0; }
  to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
}

.tavsiye-baslik {
  font-family: 'Lora', serif;
  font-size: clamp(42px, 8vw, 80px);
  font-weight: 600;
  color: #131F16;
  line-height: 1.1;
  letter-spacing: -0.5px;
  margin-bottom: 2.5vh;
}

.ayirici {
  width: 60px; height: 3px;
  background: linear-gradient(90deg, #6DB88A, #5A96D4);
  border-radius: 4px;
  margin: 0 auto 2.5vh;
}

.tavsiye-metin {
  font-family: 'Lora', serif;
  font-size: clamp(22px, 3.8vw, 38px);
  font-style: italic;
  font-weight: 400;
  color: rgba(19,31,22,0.68);
  line-height: 1.65;
}

.slogan-chip {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 3.5vh;
  background: rgba(109,184,138,0.14);
  border: 1px solid rgba(109,184,138,0.30);
  border-radius: 50px;
  padding: clamp(10px,1.5vh,16px) clamp(20px,3vw,32px);
}
.slogan-kalp { color: #6DB88A; font-size: clamp(14px,2vw,20px); }
.slogan-yazi {
  font-size: clamp(14px, 2vw, 20px);
  font-weight: 400;
  letter-spacing: 0.5px;
  color: rgba(19,31,22,0.62);
}

/* ── ALT BAR ── */
.altbar {
  width: 100%;
  border-top: 1px solid rgba(0,0,0,0.08);
  padding-top: 2.5vh;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.hava-widget {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.85);
  border-radius: 16px;
  padding: clamp(8px,1.2vh,14px) clamp(16px,2.5vw,26px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}
.hava-ikon   { font-size: clamp(22px,3.5vw,32px); line-height: 1; }
.hava-derece { font-size: clamp(22px,3.5vw,32px); font-weight: 300; color: #1A2E1E; }

.saat-widget {
  font-size: clamp(22px, 3.5vw, 34px);
  font-weight: 200;
  letter-spacing: 4px;
  color: rgba(19,31,22,0.45);
  font-variant-numeric: tabular-nums;
}

.yukleniyor {
  font-size: clamp(14px,2.5vw,20px); font-weight: 300;
  letter-spacing: 5px; color: rgba(19,31,22,0.35);
  text-transform: uppercase; padding: 6vh;
}
</style>
</head>
<body>

<div class="bg-blobs">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
</div>

<div class="screen">

  <!-- Üst: Marka -->
  <div class="topbar">
    <svg class="havan-svg" width="44" height="44" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect x="58" y="14" width="7" height="34" rx="3.5" fill="#5A8A6A"/>
      <ellipse cx="61.5" cy="13" rx="6" ry="4" fill="#7AAA8A"/>
      <path d="M14 66 Q17 50 50 50 Q83 50 86 66 L81 83 Q76 91 50 91 Q24 91 19 83 Z"
            fill="none" stroke="#5A8A6A" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M14 66 Q17 50 50 50 Q83 50 86 66"
            fill="none" stroke="rgba(90,138,106,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div class="marka-isim">Şifa Eczanesi</div>
    <div class="marka-slogan" id="sabit-slogan">Sağlığınız için güvenilir bilgi, güler yüzlü hizmet.</div>
  </div>

  <!-- Orta: Tavsiye kartı -->
  <div class="kart-wrap">
    <div class="ana-kart" id="ana-kart">
      <div class="yukleniyor">yükleniyor</div>
    </div>
  </div>

  <!-- Alt: Hava + Saat -->
  <div class="altbar">
    <div class="hava-widget" id="hava">
      <span class="hava-ikon">⏳</span>
      <span class="hava-derece">—°C</span>
    </div>
    <span class="saat-widget" id="saat">--:--:--</span>
  </div>

</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHreCt21AzQyf20jeB5J2XrhK-cEUjUf-_7K2NqyFO3aEQeUj6Z2ZLwdl2i2NNwJI/exec";

function saatGuncelle() {
  document.getElementById("saat").innerText = new Date().toLocaleTimeString("tr-TR");
}
setInterval(saatGuncelle, 1000);
saatGuncelle();

async function veriYukle() {
  try {
    const res  = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now());
    const data = await res.json();

    const h = data.hava || {};
    document.getElementById("hava").innerHTML =
      `<span class="hava-ikon">${h.ikon||"☀️"}</span><span class="hava-derece">${h.sicaklik??"—"}°C</span>`;

    const t = data.tavsiye;
    const kart = document.getElementById("ana-kart");

    if (!t) {
      kart.innerHTML = '<div class="yukleniyor">Bugün için tavsiye bulunamadı.</div>';
      return;
    }

    if (t.sabitSlogan) document.getElementById("sabit-slogan").innerText = t.sabitSlogan;

    kart.style.animation = "none";
    kart.offsetHeight;
    kart.style.animation = "riseIn 0.9s cubic-bezier(0.22,1,0.36,1) forwards";

    kart.innerHTML = `
      <div class="etiket">Eczacınızdan Günün Tavsiyesi</div>
      ${t.ikon ? `<span class="buyuk-ikon">${t.ikon}</span>` : ""}
      <div class="tavsiye-baslik">${t.baslik||""}</div>
      <div class="ayirici"></div>
      <div class="tavsiye-metin">${t.icerik||""}</div>
      ${t.slogan ? `
        <div class="slogan-chip">
          <span class="slogan-kalp">♥</span>
          <span class="slogan-yazi">${t.slogan}</span>
        </div>` : ""}
    `;
  } catch(e) {
    document.getElementById("ana-kart").innerHTML = '<div class="yukleniyor">Veri alınamadı, tekrar denenecek...</div>';
  }
}

veriYukle();
setInterval(veriYukle, 10 * 60 * 1000);
</script>
</body>
</html>
