<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="-1">
<title>Şifa Eczanesi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

:root {
  --foto: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1080&q=88&fit=crop');
}

.bg-foto {
  position: fixed; inset: 0; z-index: 0;
  background-image: var(--foto);
  background-size: cover;
  background-position: center;
  animation: kenBurns 34s ease-in-out infinite alternate;
  transition: background-image 1.5s ease;
}
@keyframes kenBurns {
  0%   { transform: scale(1.00) translate(0%, 0%);    }
  100% { transform: scale(1.10) translate(-2%, -1.5%); }
}

.overlay {
  position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(
    to bottom,
    rgba(4,12,7,0.65)  0%,
    rgba(4,12,7,0.40) 22%,
    rgba(4,12,7,0.35) 48%,
    rgba(4,12,7,0.72) 74%,
    rgba(4,12,7,0.96) 100%
  );
}

.screen {
  position: relative; z-index: 2;
  height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 6.5vh 9vw 6vh;
  color: #fff;
}

/* ── ÜST ── */
.ust {
  display: flex; flex-direction: column; align-items: center; gap: 1.2vh;
  opacity: 0; animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
}
.saat {
  font-family: 'Inter', sans-serif;
  font-size: clamp(60px, 13vw, 110px);
  font-weight: 200; letter-spacing: 6px;
  color: #ffffff;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 2px 24px rgba(0,0,0,0.6);
}
.tarih {
  font-family: 'Inter', sans-serif;
  font-size: clamp(14px, 2.2vw, 20px);
  font-weight: 300; letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.85);
  text-shadow: 0 1px 8px rgba(0,0,0,0.5);
}

/* ── ORTA ── */
.orta {
  display: flex; flex-direction: column; align-items: center; gap: 2.5vh;
  opacity: 0; animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
  text-align: center;
}
.havan-icon { opacity: 0.80; filter: drop-shadow(0 4px 14px rgba(0,0,0,0.5)); }
.ust-cizgi {
  width: 1px; height: 36px;
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.55));
}
.marka-isim {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(58px, 13vw, 115px);
  font-weight: 300; letter-spacing: 4px;
  color: #ffffff; line-height: 1.05;
  text-shadow: 0 4px 32px rgba(0,0,0,0.7);
}
.eczaci {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(22px, 3.8vw, 36px);
  font-weight: 300; font-style: italic;
  color: #ffffff;
  letter-spacing: 2px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
}
.slogan {
  font-family: 'Inter', sans-serif;
  font-size: clamp(13px, 2vw, 18px);
  font-weight: 300; letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.80);
  text-shadow: 0 1px 8px rgba(0,0,0,0.5);
}

/* ── ALT: QR ── */
.alt {
  display: flex; flex-direction: column; align-items: center; gap: 1.5vh;
  opacity: 0; animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;
}
.qr-wrap {
  background: rgba(255,255,255,0.95);
  border-radius: 14px;
  padding: clamp(7px,1.2vh,11px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.45);
}
.qr-wrap img {
  display: block;
  width: clamp(70px, 12vw, 100px);
  height: clamp(70px, 12vw, 100px);
  border-radius: 4px;
  object-fit: cover;
}
.qr-aciklama {
  font-family: 'Inter', sans-serif;
  font-size: clamp(12px, 1.8vw, 16px);
  font-weight: 300; letter-spacing: 2px;
  color: rgba(255,255,255,0.80);
  display: flex; align-items: center; gap: 8px;
  text-shadow: 0 1px 8px rgba(0,0,0,0.5);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0);    }
}
</style>
</head>
<body>

<div class="bg-foto" id="bg"></div>
<div class="overlay"></div>

<div class="screen">

  <div class="ust">
    <div class="saat" id="saat">--:--:--</div>
    <div class="tarih" id="tarih">—</div>
  </div>

  <div class="orta">
    <svg class="havan-icon" width="50" height="50" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect x="58" y="14" width="7" height="34" rx="3.5" fill="rgba(255,255,255,0.85)"/>
      <ellipse cx="61.5" cy="13" rx="6" ry="4" fill="rgba(255,255,255,0.70)"/>
      <path d="M14 66 Q17 50 50 50 Q83 50 86 66 L81 83 Q76 91 50 91 Q24 91 19 83 Z"
            fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M14 66 Q17 50 50 50 Q83 50 86 66"
            fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div class="ust-cizgi"></div>
    <div class="marka-isim">Şifa Eczanesi</div>
    <div class="eczaci">Ecz. Ercüment Yakar</div>
    <div class="slogan">Sağlığınız için güvenilir bilgi · güler yüzlü hizmet</div>
  </div>

  <div class="alt">
    <div class="qr-wrap">
      <img src="https://yakar-hash.github.io/nobetci-ekran/qrwhatsapp.png" alt="WhatsApp QR">
    </div>
    <div class="qr-aciklama">
      <span>💬</span><span>WhatsApp'tan bize yazın</span>
    </div>
  </div>

</div>

<script>
const MARKA_URL = "https://script.google.com/macros/s/AKfycbwwRS3wQypP6NgilE77KP7qS5x9-sYySblz-4CbrEzLciegkzTTKINfPXQ8p3FFniPP/exec";

async function fotoCek() {
  try {
    const res  = await fetch(MARKA_URL + "?t=" + Date.now());
    const data = await res.json();
    if (data.url && data.url.startsWith("https://images.unsplash.com")) {
      document.documentElement.style.setProperty("--foto", `url('${data.url}')`);
    }
  } catch(e) {}
}
fotoCek();
setInterval(fotoCek, 15 * 60 * 1000);

// Saat
setInterval(() => {
  document.getElementById("saat").innerText = new Date().toLocaleTimeString("tr-TR");
}, 1000);
document.getElementById("saat").innerText = new Date().toLocaleTimeString("tr-TR");

// Tarih
(function() {
  const s = new Date();
  const g = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"][s.getDay()];
  const t = s.toLocaleDateString("tr-TR", { day:"numeric", month:"long", year:"numeric" });
  document.getElementById("tarih").innerText = g + "  ·  " + t;
})();
</script>
</body>
</html>
