<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<title>Şifa Eczanesi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

:root { --foto: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1080&q=88&fit=crop'); }

.bg-foto {
  position: fixed; inset: 0; z-index: 0;
  background-image: var(--foto);
  background-size: cover; background-position: center;
  animation: kenBurns 34s ease-in-out infinite alternate;
}
@keyframes kenBurns {
  0%   { transform: scale(1.00) translate( 0%,  0%  ); }
  100% { transform: scale(1.10) translate(-2%, -1.5%); }
}

.overlay {
  position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(
    to bottom,
    rgba(4,12,7,0.50)  0%,
    rgba(4,12,7,0.22) 22%,
    rgba(4,12,7,0.18) 48%,
    rgba(4,12,7,0.60) 74%,
    rgba(4,12,7,0.94) 100%
  );
}

.screen {
  position: relative; z-index: 2;
  height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 6.5vh 9vw 6vh;
  color: #fff;
}

/* ── ÜST ── */
.ust {
  display: flex; flex-direction: column; align-items: center; gap: 1.2vh;
  opacity: 0; animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
}
.saat {
  font-family: 'Inter', sans-serif;
  font-size: clamp(52px, 11vw, 96px);
  font-weight: 200; letter-spacing: 6px;
  color: rgba(255,255,255,0.92);
  font-variant-numeric: tabular-nums;
  text-shadow: 0 2px 24px rgba(0,0,0,0.45);
}
.tarih {
  font-family: 'Inter', sans-serif;
  font-size: clamp(11px, 1.7vw, 15px);
  font-weight: 300; letter-spacing: 6px;
  text-transform: uppercase; color: rgba(255,255,255,0.38);
}

/* ── ORTA ── */
.orta {
  display: flex; flex-direction: column; align-items: center; gap: 2.8vh;
  opacity: 0; animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
  text-align: center;
}
.havan-icon { opacity: 0.50; filter: drop-shadow(0 4px 14px rgba(0,0,0,0.5)); }
.ust-cizgi { width: 1px; height: 36px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.30)); }
.marka-isim {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(50px, 11vw, 102px);
  font-weight: 300; letter-spacing: 4px;
  color: #fff; line-height: 1.05;
  text-shadow: 0 4px 40px rgba(0,0,0,0.55);
}
.eczaci {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(17px, 2.8vw, 28px);
  font-weight: 300; font-style: italic;
  color: rgba(255,255,255,0.48); letter-spacing: 2px;
}
.slogan {
  font-family: 'Inter', sans-serif;
  font-size: clamp(10px, 1.6vw, 15px);
  font-weight: 300; letter-spacing: 3.5px;
  text-transform: uppercase; color: rgba(255,255,255,0.28);
}

/* ── ALT: QR ── */
.alt {
  display: flex; flex-direction: column; align-items: center; gap: 2vh;
  opacity: 0; animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;
}
.qr-wrap {
  background: rgba(255,255,255,0.95);
  border-radius: 18px;
  padding: clamp(10px,1.8vh,16px);
  box-shadow: 0 12px 48px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.95);
}
.qr-wrap img {
  display: block;
  width: clamp(110px, 20vw, 155px);
  height: clamp(110px, 20vw, 155px);
  border-radius: 6px;
  object-fit: cover;
}
.qr-aciklama {
  font-family: 'Inter', sans-serif;
  font-size: clamp(10px, 1.5vw, 14px);
  font-weight: 300; letter-spacing: 2px;
  color: rgba(255,255,255,0.32);
  display: flex; align-items: center; gap: 8px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0);    }
}
</style>
</head>
<body>

<div class="bg-foto"></div>
<div class="overlay"></div>

<div class="screen">

  <div class="ust">
    <div class="saat" id="saat">--:--:--</div>
    <div class="tarih" id="tarih">—</div>
  </div>

  <div class="orta">
    <svg class="havan-icon" width="46" height="46" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect x="58" y="14" width="7" height="34" rx="3.5" fill="rgba(255,255,255,0.75)"/>
      <ellipse cx="61.5" cy="13" rx="6" ry="4" fill="rgba(255,255,255,0.55)"/>
      <path d="M14 66 Q17 50 50 50 Q83 50 86 66 L81 83 Q76 91 50 91 Q24 91 19 83 Z"
            fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M14 66 Q17 50 50 50 Q83 50 86 66"
            fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div class="ust-cizgi"></div>
    <div class="marka-isim">Şifa Eczanesi</div>
    <div class="eczaci">Ecz. Ercüment Yakar</div>
    <div class="slogan">Sağlığınız için güvenilir bilgi · güler yüzlü hizmet</div>
  </div>

  <div class="alt">
    <div class="qr-wrap">
      <img src="https://yakar-hash.github.io/nobetci-ekran/qrwhatsapp.png" alt="WhatsApp QR">
    </div>
    <div class="qr-aciklama">
      <span>💬</span><span>WhatsApp'tan bize yazın</span>
    </div>
  </div>

</div>

<script>

const foto = FOTOLAR[Math.floor(Math.random() * FOTOLAR.length)];
document.documentElement.style.setProperty(

  `url('https://images.unsplash.com/${foto}?w=1080&q=88&fit=crop&crop=center')`

// Saat
setInterval(() => {
  document.getElementById("saat").innerText = new Date().toLocaleTimeString("tr-TR");
}, 1000);
document.getElementById("saat").innerText = new Date().toLocaleTimeString("tr-TR");

// Tarih
(function() {
  const s = new Date();
  const g = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"][s.getDay()];
  const t = s.toLocaleDateString("tr-TR", { day:"numeric", month:"long", year:"numeric" });
  document.getElementById("tarih").innerText = g + "  ·  " + t;
})();
</script>
</body>
</html>
